name: update-site

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 6:00 JST
  workflow_dispatch:        # 手動実行も可能
  push:
    paths:
      - "static/**"         # 静的ページ追加・変更時も再ビルド

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Scrape latest items
        run: python scraper/scrape.py

      - name: Generate site
        run: python scraper/generate.py

      - name: Instagram投稿生成の準備 (フォント+ライブラリ)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          pip install --quiet pillow requests beautifulsoup4

      - name: Instagram投稿を生成
        run: python tools/generate_posts.py --items-json data/items.json --out posts

      - name: 投稿をサイトに含める
        run: |
          mkdir -p site/posts
          cp -r posts/. site/posts/

      - name: 静的ファイルをサイトに含める (TikTok連携ページ等)
        run: |
          if [ -d static ]; then cp -r static/. site/; fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/items.json posts
          git diff --cached --quiet || git commit -m "chore: update items $(date +%F)"
          # 実行中に別コミットが入っても競合しないようリベースしてから push
          git pull --rebase origin main
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
