<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Instagram投稿 生成結果｜ガチャ新作ナビ</title>
<style>
body{font-family:sans-serif;background:#FBF5EA;margin:0;padding:16px}
h1{font-size:18px;color:#5B3A1E} h2{font-size:15px;color:#5B3A1E}
.set{background:#fff;border-radius:12px;padding:12px;margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.08)}
.strip{display:flex;gap:8px;overflow-x:auto}
.strip img{height:300px;border-radius:8px}
button{margin-top:10px;padding:10px 16px;border:none;border-radius:8px;
background:#DE8A2E;color:#fff;font-size:14px;cursor:pointer}
</style></head><body>
<h1>Instagram投稿 生成結果</h1>
<p>画像を長押し(右クリック)で保存 → Instagramでカルーセル投稿してください。</p>
<div class="set"><h2>2026-07-17</h2>
<div class="strip"><img src="2026-07-17/01_cover.png" loading="lazy"><img src="2026-07-17/02_vol1.png" loading="lazy"><img src="2026-07-17/03_vol2.png" loading="lazy"><img src="2026-07-17/04_vol3.png" loading="lazy"><img src="2026-07-17/05_vol4.png" loading="lazy"><img src="2026-07-17/06_vol5.png" loading="lazy"><img src="2026-07-17/07_vol6.png" loading="lazy"><img src="2026-07-17/08_vol7.png" loading="lazy"><img src="2026-07-17/09_vol8.png" loading="lazy"><img src="2026-07-17/10_vol9.png" loading="lazy"><img src="2026-07-17/11_vol10.png" loading="lazy"><img src="2026-07-17/12_vol11.png" loading="lazy"><img src="2026-07-17/13_vol12.png" loading="lazy"><img src="2026-07-17/14_vol13.png" loading="lazy"><img src="2026-07-17/15_vol14.png" loading="lazy"><img src="2026-07-17/16_vol15.png" loading="lazy"><img src="2026-07-17/17_vol16.png" loading="lazy"><img src="2026-07-17/18_cta.png" loading="lazy"></div>
<button onclick="copyCap('2026-07-17', this)">キャプションをコピー</button></div>
<script>
async function copyCap(name, btn){
  const t = await (await fetch(name + '/caption.txt')).text();
  await navigator.clipboard.writeText(t);
  btn.textContent = 'コピーしました!';
  setTimeout(()=>btn.textContent='キャプションをコピー', 1500);
}
</script></body></html>
