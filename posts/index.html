<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Instagram投稿 生成結果｜ガチャ新作ナビ</title>
<style>
body{font-family:sans-serif;background:#EDF6F2;margin:0;padding:16px}
h1{font-size:18px;color:#22384F} h2{font-size:15px;color:#22384F}
.set{background:#fff;border-radius:12px;padding:12px;margin-bottom:20px;
box-shadow:0 2px 8px rgba(34,56,79,.12)}
.strip{display:flex;gap:8px;overflow-x:auto}
.strip img{height:300px;border-radius:8px}
button{margin-top:10px;padding:10px 16px;border:none;border-radius:8px;
background:#FF6058;color:#fff;font-size:14px;cursor:pointer}
</style></head><body>
<h1>Instagram投稿 生成結果</h1>
<p>画像を長押し(右クリック)で保存 → Instagramでカルーセル投稿してください。</p>
<div class="set"><h2>2026-07-18</h2>
<div class="strip"><img src="2026-07-18/01_cover.png" loading="lazy"><img src="2026-07-18/02_page1.png" loading="lazy"><img src="2026-07-18/03_page2.png" loading="lazy"><img src="2026-07-18/04_page3.png" loading="lazy"><img src="2026-07-18/05_page4.png" loading="lazy"><img src="2026-07-18/06_page5.png" loading="lazy"><img src="2026-07-18/07_page6.png" loading="lazy"><img src="2026-07-18/08_page7.png" loading="lazy"><img src="2026-07-18/09_page8.png" loading="lazy"><img src="2026-07-18/10_page9.png" loading="lazy"><img src="2026-07-18/11_page10.png" loading="lazy"><img src="2026-07-18/12_page11.png" loading="lazy"><img src="2026-07-18/13_page12.png" loading="lazy"><img src="2026-07-18/14_page13.png" loading="lazy"><img src="2026-07-18/15_page14.png" loading="lazy"><img src="2026-07-18/16_page15.png" loading="lazy"><img src="2026-07-18/17_page16.png" loading="lazy"><img src="2026-07-18/18_cta.png" loading="lazy"></div>
<button onclick="copyCap('2026-07-18', this)">キャプションをコピー</button></div>
<script>
async function copyCap(name, btn){
  const t = await (await fetch(name + '/caption.txt')).text();
  await navigator.clipboard.writeText(t);
  btn.textContent = 'コピーしました!';
  setTimeout(()=>btn.textContent='キャプションをコピー', 1500);
}
</script></body></html>
